name: Update profile README

on:
  workflow_dispatch:
  repository_dispatch:
    types: [profile-update]
  schedule:
    - cron: "17 * * * *" # hourly polling, offset to avoid peak-time delays

concurrency:
  group: profile-readme-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  curate:
    # The project repository keeps its documentation README. Generation runs only
    # after the template is copied to the special username profile repository.
    if: github.event.repository.name == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - uses: ./.github/actions/setup-ollama
        with:
          model: qwen2.5:3b-instruct

      - name: Build curated profile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/fetch_repos.py --output .cache/repos.json
          python scripts/score_projects.py --input .cache/repos.json --output .cache/curated.json
          python scripts/render_header.py --config config.yml --input .cache/curated.json --output assets/header.svg
          python scripts/render_pet.py --input .cache/curated.json --output assets/pet.svg
          python scripts/render_svg.py --input .cache/curated.json --output assets/languages.svg
          python scripts/render_readme.py --input .cache/curated.json --output README.md

      - name: Commit refreshed profile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/header.svg assets/pet.svg assets/languages.svg .cache/summaries.json
          git diff --cached --quiet || git commit -m "chore: refresh profile from repository activity"
          git push

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python scripts/notify_on_fail.py
