<svg xmlns="http://www.w3.org/2000/svg" width="700" height="178" viewBox="0 0 700 178" role="img" aria-label="Languages used across featured repositories">
<style>
  .panel { fill: #f6f8fa; stroke: #d0d7de; }
  .title { fill: #1f2328; font: 600 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .subtitle, .percent { fill: #656d76; font: 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .label { fill: #1f2328; font: 600 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  @media (prefers-color-scheme: dark) {
    .panel { fill: #161b22; stroke: #30363d; }
    .title, .label { fill: #e6edf3; }
    .subtitle, .percent { fill: #8b949e; }
  }
</style>
<rect class="panel" x="0.5" y="0.5" width="699" height="177" rx="8"/>
<text x="24" y="34" class="title">Language mix</text>
<text x="24" y="53" class="subtitle">Across automatically selected repositories</text>
<clipPath id="bar"><rect x="24" y="70" width="652" height="14" rx="7"/></clipPath>
<g clip-path="url(#bar)"><rect x="24.00" y="70" width="326.00" height="14" fill="#7C5CFC"/><rect x="350.00" y="70" width="217.33" height="14" fill="#22C55E"/><rect x="567.33" y="70" width="108.67" height="14" fill="#38BDF8"/></g><g><circle cx="28" cy="114" r="5" fill="#7C5CFC"/><text x="41" y="119" class="label">JavaScript</text><text x="218" y="119" text-anchor="end" class="percent">50%</text><circle cx="246" cy="114" r="5" fill="#22C55E"/><text x="259" y="119" class="label">Python</text><text x="436" y="119" text-anchor="end" class="percent">33%</text><circle cx="464" cy="114" r="5" fill="#38BDF8"/><text x="477" y="119" class="label">TypeScript</text><text x="654" y="119" text-anchor="end" class="percent">17%</text></g></svg>